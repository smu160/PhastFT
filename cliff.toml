# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# A Tera template to be rendered for each release in the changelog.
# See https://keats.github.io/tera/docs/#introduction
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
# Remove leading and trailing whitespaces from the changelog's body.
trim = true
# Render body even when there are no releases to process.
render_always = true
# An array of regex based postprocessors to modify the changelog.
postprocessors = [
    # Replace the placeholder <REPO> with the GitHub URL.
    { pattern = '<REPO>', replace = "https://github.com/smu160/PhastFT" },
]

[git]
# Parse commits according to the conventional commits specification.
# See https://www.conventionalcommits.org
conventional_commits = true
# Keep unconventional commits — older history predates the spec.
# Without this, the catch-all parser below has nothing to catch.
filter_unconventional = false
# Require all commits to be conventional.
# Takes precedence over filter_unconventional.
require_conventional = false
# Split commits on newlines, treating each line as an individual commit.
split_commits = false
# An array of regex based parsers to modify commit messages prior to further processing.
commit_preprocessors = [
    # Turn `(#123)` references into Markdown links to the PR/issue.
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](<REPO>/pull/${2}))" },
]
# Prevent commits that are breaking from being excluded by commit parsers.
protect_breaking_commits = false
# Regex parsers for grouping commits.
# First match wins, so put skips and conventional patterns before heuristics
# so that, e.g., `chore: prepare release` is skipped instead of grouped as Misc.
commit_parsers = [
    # ── Noise to drop ─────────────────────────────────────────────────────
    { message = "^Merge ", skip = true },
    { message = "^Bump version", skip = true },
    { message = "^chore: prepare", skip = true },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^Updates?$", skip = true },
    { message = "^Update todo", skip = true },
    # Trivia / WIP / fixup noise — drop entirely, not user-facing.
    # `(?i)` makes the match case-insensitive; commit subjects in this repo
    # mix capitalizations ("WIP" vs "wip", "Jankily" vs "jankily", etc.).
    { message = "(?i)^cargo fmt", skip = true },
    { message = "(?i)^wip( |$)", skip = true },
    { message = "(?i)^wording$", skip = true },
    { message = "(?i)^add a comment$", skip = true },
    { message = "(?i)^add comment$", skip = true },
    { message = "(?i)^add (a )?forgotten", skip = true },
    { message = "(?i)^initial commit$", skip = true },
    { message = "(?i)^jankily ", skip = true },
    { message = "(?i)^once more", skip = true },
    { message = "(?i)^fixes$", skip = true },
    { message = "(?i)^it'?s alive", skip = true },
    { message = "(?i)^try experimental", skip = true },
    { message = "(?i)^commit a file that i forgot", skip = true },

    # ── Conventional commits (newer history) ──────────────────────────────
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 4 -->Performance" },
    { message = "^refactor", group = "<!-- 2 -->Refactor" },
    { message = "^docs?", group = "<!-- 3 -->Documentation" },
    { message = "^style", group = "<!-- 5 -->Styling" },
    { message = "^test", group = "<!-- 6 -->Testing" },
    { message = "^revert", group = "<!-- 9 -->Revert" },
    { body = ".*security", group = "<!-- 8 -->Security" },
    { message = "^chore|^ci", group = "<!-- 7 -->Miscellaneous Tasks" },

    # ── Heuristics for older free-form commits ────────────────────────────
    # Documentation-flavored "Add ..." commits BEFORE the broad ^[Aa]dd rule
    # so that "Add a comment to X" / "Add documentation" route to Docs, not Features.
    { message = "^(Doc|Document|Clarify|Update README|Update docs?|Add a comment |Add documentation)", group = "<!-- 3 -->Documentation" },
    { message = "^[Aa]dd ", group = "<!-- 0 -->Features" },
    { message = "^[Ff]ix(ed|es)? ", group = "<!-- 1 -->Bug Fixes" },
    { message = "^(Speed up|Improve|Optimize|Properly vectorize|Tighten|Address|Reduce|Eliminate)", group = "<!-- 4 -->Performance" },
    { message = "^(Refactor|Simplify|Make|Move|Factor|Replace|Pass|Encode|Polyfill|Rename|Mark|Suppress|Use|Avoid|Switch|Run)", group = "<!-- 2 -->Refactor" },
    { message = "^(Remove|Delete|Drop)", group = "<!-- 7 -->Miscellaneous Tasks" },
    { message = "^(Update|Bump|Cleanup|Clean ?up|Cleaner)", group = "<!-- 7 -->Miscellaneous Tasks" },
    { message = "^Revert", group = "<!-- 9 -->Revert" },

    # ── Catch-all so nothing gets dropped silently ───────────────────────
    { message = ".*", group = "<!-- 10 -->Other" },
]
# Exclude commits that are not matched by any commit parser.
filter_commits = false
# Fail on a commit that is not matched by any commit parser.
fail_on_unmatched_commit = false
# An array of link parsers for extracting external references, and turning them into URLs, using regex.
link_parsers = []
# Include only the tags that belong to the current branch.
use_branch_tags = false
# Order releases topologically instead of chronologically.
topo_order = false
# Order commits topologically instead of chronologically.
topo_order_commits = true
# Order of commits in each group/release within the changelog.
# Allowed values: newest, oldest
sort_commits = "oldest"
# Process submodules commits
recurse_submodules = false
